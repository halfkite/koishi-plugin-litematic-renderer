        body {

        }

        /* Minecraft 风格的像素边框 */
        .pixel-border {
            position: relative;
            border: 4px solid var(--secondary-color);
        }

        .pixel-border::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid var(--primary-light);
            pointer-events: none;
        }

        /* 背景特效 - 浮动方块 */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bg-block {
            position: absolute;
            opacity: 0.05;
            animation: float 20s infinite ease-in-out;
        }

        .bg-block:nth-child(1) {
            width: 80px;
            height: 80px;
            top: -40px;
            left: 10%;
            background-color: var(--primary-color);
            animation-duration: 25s;
        }

        .bg-block:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 40%;
            right: -30px;
            background-color: var(--secondary-color);
            animation-duration: 30s;
            animation-delay: 2s;
        }

        .bg-block:nth-child(3) {
            width: 50px;
            height: 50px;
            bottom: 10%;
            left: 15%;
            background-color: var(--accent-color);
            animation-duration: 22s;
            animation-delay: 4s;
        }

        .bg-block:nth-child(4) {
            width: 40px;
            height: 40px;
            top: 20%;
            left: 30%;
            background-color: var(--dirt-color);
            animation-duration: 18s;
            animation-delay: 1s;
        }

        .bg-block:nth-child(5) {
            width: 30px;
            height: 30px;
            bottom: 5%;
            right: 20%;
            background-color: var(--stone-color);
            animation-duration: 24s;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0);
            }
            25% {
                transform: translateY(-30px) translateX(20px) rotate(5deg);
            }
            50% {
                transform: translateY(20px) translateX(40px) rotate(10deg);
            }
            75% {
                transform: translateY(30px) translateX(-20px) rotate(5deg);
            }
        }

        /* 网格背景 */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(60, 114, 54, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(60, 114, 54, 0.05) 1px, transparent 1px);
            opacity: 0.8;
        }

        .header {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
            border-bottom: 6px solid var(--secondary-color);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            font-family: var(--mc-font);
            letter-spacing: 1px;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: var(--background-color);
            border-radius: 0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .card {
            background-color: var(--card-bg-color);
            border: var(--pixel-border);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: var(--box-shadow);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            position: relative;
            padding-bottom: 0.5rem;
            font-family: var(--mc-font);
        }

        .card h2::before {
            content: '⛏️';
            margin-right: 10px;
            font-size: 1.4rem;
        }

        .card h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 60px;
            background-color: var(--accent-color);
        }

            display: flex;

            border: 3px dashed var(--secondary-color);

            margin-bottom: 1rem;

        /* 增加文件类型指南，减少空旷感 */

        .view-card-body:before {

            max-height: 80%;

            align-items: center;

            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.3s ease;
            image-rendering: auto; /* Use standard rendering for high-res images */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            image-resolution: from-image; /* Use image's native resolution */
        }

        .lightbox-caption {
            color: white;
            text-align: center;
            padding: 1rem;
            font-size: 1.2rem;
        }

            background-color: rgba(255, 255, 255, 0.2);

            border-radius: 50%;
            display: flex;

            display: flex;
            justify-content: space-between;

            transform: translateY(-50%);
        }

        .lightbox-nav-btn {
            background-color: rgba(255, 255, 255, 0.2);

            cursor: pointer;
            transition: background-color 0.3s ease;

        }

        /* 响应式设计 */

    </style>
</head>
<body>
    <!-- 背景特效 -->
    <div class="grid-background"></div>
    <div class="bg-animation">
        <div class="bg-block"></div>
        <div class="bg-block"></div>
        <div class="bg-block"></div>
        <div class="bg-block"></div>
        <div class="bg-block"></div>
    </div>

    <!-- 纹理图集 -->
    <img id="atlas" src="./我的世界-Litematic投影三视图预览_files/atlas.png" alt="Texture atlas" crossorigin="anonymous" hidden="">

    <!-- 灯箱组件 -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <div class="lightbox-controls">
                <button class="lightbox-btn lightbox-zoom-in" id="zoom-in">+</button>
                <button class="lightbox-btn lightbox-zoom-out" id="zoom-out">-</button>
                <button class="lightbox-btn lightbox-close" id="close-lightbox">×</button>
            </div>
            <img class="lightbox-image" id="lightbox-image" src="https://mcimg.com/gongju/Threeviews/" alt="Enlarged view">
            <div class="lightbox-caption" id="lightbox-caption"></div>
        </div>
        <div class="lightbox-navigation">
            <button class="lightbox-nav-btn" id="prev-image">❮</button>
            <button class="lightbox-nav-btn" id="next-image">❯</button>
        </div>
    </div>

    <div class="header">
        <h1>我的世界-Litematic投影三视图预览</h1>
    </div>

    <div class="container">
        <div class="card fadeIn pixel-border">
            <h2>上传文件</h2>
            <div class="file-upload" id="drop-area">
                <div class="upload-icon mc-icon">📦</div>
                <p>拖放 .litematic 文件到这里，或点击选择文件</p>
                <input type="file" id="file-input" accept=".litematic">
                <button class="btn" id="select-file-btn">选择文件</button>
                <div class="crafting-grid">
                    <div></div><div></div><div></div>
                    <div></div><div></div><div></div>
                    <div></div><div></div><div></div>
                </div>
            </div>
            
            <!-- 安全提示 -->
            <div class="security-notice">
                <h4>📢 安全提示</h4>
                <p>本工具仅支持.litematic格式文件，大小不超过20MB。出于安全考虑，所有上传内容仅在本地处理，不会上传到服务器。</p>
            </div>
            
            <!-- 增加文件指南，减少空旷感 -->
            <div class="file-guide">
                <div class="file-type">
                    <div class="file-type-icon">📄</div>
                    <h4>支持文件格式</h4>
                    <p>仅支持 .litematic 格式文件</p>
                </div>
                <div class="file-type">
                    <div class="file-type-icon">⚙️</div>
                    <h4>生成内容</h4>
                    <p>自动生成正视图、侧视图和俯视图</p>
                </div>
                <div class="file-type">
                    <div class="file-type-icon">🔍</div>
                    <h4>文件大小</h4>
                    <p>建议文件大小不超过20MB</p>
                </div>
            </div>
            
            <div id="file-result" class="status hidden"></div>
            <div id="render-status" class="status hidden"></div>
        </div>

        <div id="views-card" class="card hidden pixel-border">
            <h2>渲染结果</h2>
            <div id="views-loading" class="loading hidden">
                <div class="loading-text">正在渲染三视图，请稍候...</div>
            </div>
            <div id="three-views-result" class="views-container"></div>
        </div>
    </div>

    <footer>
        我的世界Litematic 三视图渲染工具 © 2025
    </footer>

    <script>
        // DOM 元素
        const fileInput = document.getElementById('file-input');
        const selectFileBtn = document.getElementById('select-file-btn');
        const dropArea = document.getElementById('drop-area');
        const fileResult = document.getElementById('file-result');
        const renderStatus = document.getElementById('render-status');
        const threeViewsResult = document.getElementById('three-views-result');
        const viewsCard = document.getElementById('views-card');
        const viewsLoading = document.getElementById('views-loading');
        
        // 灯箱元素
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const closeLightbox = document.getElementById('close-lightbox');
        const zoomIn = document.getElementById('zoom-in');
        const zoomOut = document.getElementById('zoom-out');
        const prevImage = document.getElementById('prev-image');
        const nextImage = document.getElementById('next-image');
        
        // 灯箱状态
        let currentZoom = 1;
        let currentImageIndex = 0;
        let allImages = [];

        // 资源加载
        document.addEventListener("DOMContentLoaded", async function() {
            try {
                const image = document.getElementById('atlas');
                if (image.complete) {
                    loadDeepslateResources(image);
                } else {
                    image.onload = () => {
                        loadDeepslateResources(image);
                    };
                }
            } catch (error) {
                console.error("资源加载错误:", error);
                showStatus(fileResult, "资源加载失败: " + error.message, "error");
            }
            
            // 初始化灯箱事件
            initLightbox();
        });
        
        // 初始化灯箱功能
        function initLightbox() {
            // 关闭灯箱
            closeLightbox.addEventListener('click', () => {
                lightbox.classList.remove('active');
                currentZoom = 1;
                lightboxImage.style.transform = `scale(${currentZoom})`;
            });
            
            // 点击灯箱背景关闭
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    lightbox.classList.remove('active');
                }
            });
            
            // 放大
            zoomIn.addEventListener('click', () => {
                currentZoom += 0.2;
                if (currentZoom > 3) currentZoom = 3;
                lightboxImage.style.transform = `scale(${currentZoom})`;
            });
            
            // 缩小
            zoomOut.addEventListener('click', () => {
                currentZoom -= 0.2;
                if (currentZoom < 0.5) currentZoom = 0.5;
                lightboxImage.style.transform = `scale(${currentZoom})`;
            });
            
            // 鼠标滚轮缩放
            lightbox.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY < 0) {
                    // 向上滚动，放大
                    currentZoom += 0.1;
                    if (currentZoom > 3) currentZoom = 3;
                } else {
                    // 向下滚动，缩小
                    currentZoom -= 0.1;
                    if (currentZoom < 0.5) currentZoom = 0.5;
                }
                lightboxImage.style.transform = `scale(${currentZoom})`;
            });
            
            // 前一张图片
            prevImage.addEventListener('click', () => {
                if (allImages.length <= 1) return;
                currentImageIndex--;
                if (currentImageIndex < 0) currentImageIndex = allImages.length - 1;
                updateLightboxImage();
            });
            
            // 下一张图片
            nextImage.addEventListener('click', () => {
                if (allImages.length <= 1) return;
                currentImageIndex++;
                if (currentImageIndex >= allImages.length) currentImageIndex = 0;
                updateLightboxImage();
            });
            
            // 键盘事件
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                
                switch (e.key) {
                    case 'Escape':
                        lightbox.classList.remove('active');
                        break;
                    case 'ArrowLeft':
                        prevImage.click();
                        break;
                    case 'ArrowRight':
                        nextImage.click();
                        break;
                    case '+':
                    case '=':
                        zoomIn.click();
                        break;
                    case '-':
                        zoomOut.click();
                        break;
                }
            });
        }
        
        // 更新灯箱图片
        function updateLightboxImage() {
            const currentImage = allImages[currentImageIndex];
            lightboxImage.src = currentImage.src;
            lightboxCaption.textContent = currentImage.caption;
            currentZoom = 1;
            lightboxImage.style.transform = `scale(${currentZoom})`;
        }
        
        // 打开灯箱
        function openLightbox(src, caption, imagesList) {
            lightboxImage.src = src;
            lightboxCaption.textContent = caption;
            allImages = imagesList || [{src, caption}];
            currentImageIndex = allImages.findIndex(img => img.src === src);
            currentZoom = 1;
            lightboxImage.style.transform = `scale(${currentZoom})`;
            lightbox.classList.add('active');
        }

        // 点击按钮选择文件
        selectFileBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // 拖放功能
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => {
                dropArea.classList.add('dragging');
            }, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => {
                dropArea.classList.remove('dragging');
            }, false);
        });
        
        dropArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) {
                fileInput.files = files;
                handleFiles(files);
            }
        }, false);

        // 文件输入改变事件
        fileInput.addEventListener('change', (event) => {
            const files = event.target.files;
            if (files.length) {
                handleFiles(files);
            }
        });

        // 处理上传的文件
        async function handleFiles(files) {
            const file = files[0];
            if (!file) return;
            
            // 检查文件类型
            if (!file.name.toLowerCase().endsWith('.litematic')) {
                showStatus(fileResult, '不支持的文件类型，请上传.litematic格式文件', 'error');
                return;
            }
            
            // 检查文件大小（20MB限制）
            if (file.size > 20 * 1024 * 1024) {
                showStatus(fileResult, '文件过大，请上传小于20MB的文件', 'error');
                return;
            }
            
            showStatus(fileResult, '正在加载文件...', 'processing');
            
            try {
                // 安全性检查 - 基本内容检查
                const fileHeader = await readFileHeader(file, 8);
                // 检查文件魔数或特征 - .litematic文件是gzip压缩的NBT格式，检查gzip头
                // gzip文件的头两个字节是0x1F 0x8B
                if (fileHeader[0] !== 0x1F || fileHeader[1] !== 0x8B) {
                    showStatus(fileResult, '无效的.litematic文件格式', 'error');
                    return;
                }
                
                await litematicViewerAPI.loadFromFile(file);
                showStatus(fileResult, '文件加载成功: ' + file.name, 'success');
                
                // 显示渲染卡片
                viewsCard.classList.remove('hidden');
                viewsLoading.classList.remove('hidden');
                
                // 自动开始渲染三视图
                renderThreeViews();
            } catch (error) {
                showStatus(fileResult, '文件加载失败: ' + error.message, 'error');
            }
        }
        
        // 读取文件头部字节
        function readFileHeader(file, bytes) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const arr = new Uint8Array(reader.result);
                    resolve(arr);
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file.slice(0, bytes));
            });
        }

        // 显示状态信息
        function showStatus(element, message, type = '') {
            element.textContent = message;
            element.classList.remove('hidden', 'success', 'error', 'processing');
            if (type) {
                element.classList.add(type);
            }
        }

        // 三视图渲染函数
        async function renderThreeViews() {
            threeViewsResult.innerHTML = '';
            showStatus(renderStatus, '开始渲染三视图...', 'processing');
            
            try {
                // 使用超高渲染分辨率
                const width = 2000;
                const height = 1500;

                showStatus(renderStatus, `正在渲染三视图 (每视图 ${width}x${height})...`, 'processing');

                // 使用高质量渲染设置
                const views = await litematicViewerAPI.renderThreeViews({
                    width,
                    height,
                    quality: 'high', // 高质量渲染
                    antialias: true, // 抗锯齿
                    preserveDrawingBuffer: true // 保留绘图缓冲区以确保高质量输出
                });

                // 创建视图容器
                const viewContainers = {
                    '正视图': views.frontView,
                    '侧视图': views.sideView,
                    '俯视图': views.topView
                };

                // 隐藏加载动画
                viewsLoading.classList.add('hidden');
                
                // 准备所有图像数据，用于灯箱
                let allViewImages = [];
                Object.entries(viewContainers).forEach(([title, imageData]) => {
                    allViewImages.push({
                        src: imageData,
                        caption: title
                    });
                });
                
                // 显示所有视图
                let delay = 0;
                Object.entries(viewContainers).forEach(([title, imageData], index) => {
                    const viewCard = document.createElement('div');
                    viewCard.className = 'view-card';
                    viewCard.style.animationDelay = `${delay}s`;
                    delay += 0.2;

                    const header = document.createElement('div');
                    header.className = 'view-card-header';
                    
                    // 添加Minecraft风格的图标
                    const icon = document.createElement('span');
                    icon.className = 'view-icon';
                    if (title === '正视图') {
                        icon.textContent = '🧱 '; // 方块图标
                    } else if (title === '侧视图') {
                        icon.textContent = '🪓 '; // 斧头图标
                    } else if (title === '俯视图') {
                        icon.textContent = '🔍 '; // 俯瞰图标
                    }
                    
                    header.appendChild(icon);
                    header.appendChild(document.createTextNode(title));
                    viewCard.appendChild(header);
                    
                    const body = document.createElement('div');
                    body.className = 'view-card-body';
                    
                    const img = new Image();
                    
                    // 确保图像以最高质量加载
                    img.onload = () => {
                        viewCard.classList.add('fadeIn');
                        
                        // 应用高质量图像处理
                        img.style.imageRendering = 'auto';
                        img.setAttribute('loading', 'eager'); // 优先加载图像
                        img.setAttribute('decoding', 'sync'); // 同步解码以获得最佳质量
                    };
                    
                    img.src = imageData;
                    img.alt = title;
                    img.setAttribute('importance', 'high'); // 标记为高优先级资源
                    // 添加点击事件，打开灯箱
                    img.addEventListener('click', () => {
                        openLightbox(imageData, title, allViewImages);
                    });
                    
                    // 添加鼠标滚轮缩放功能（直接在视图上）
                    body.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        const image = e.currentTarget.querySelector('img');
                        const currentScale = parseFloat(image.style.transform.replace('scale(', '').replace(')', '') || 1);
                        
                        let newScale;
                        if (e.deltaY < 0) {
                            // 向上滚动，放大
                            newScale = Math.min(currentScale + 0.1, 3);
                        } else {
                            // 向下滚动，缩小
                            newScale = Math.max(currentScale - 0.1, 0.5);
                        }
                        
                        image.style.transform = `scale(${newScale})`;
                        image.style.transformOrigin = 'center center';
                    }, { passive: false });
                    
                    // onload 已在上方定义
                    
                    body.appendChild(img);
                    viewCard.appendChild(body);
                    
                    threeViewsResult.appendChild(viewCard);
                });
                
                showStatus(renderStatus, '三视图渲染完成', 'success');
                
            } catch (error) {
                viewsLoading.classList.add('hidden');
                showStatus(renderStatus, '三视图渲染失败: ' + error.message, 'error');
            }
        }
    </script>
